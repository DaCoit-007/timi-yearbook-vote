<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiMi同学录 · P4 内测投票</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #F0F8FC;
    color: #0E3B52;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: 120px;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 0 16px; }

  /* 顶栏 */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(240, 248, 252, 0.92);
    backdrop-filter: saturate(1.2) blur(10px);
    -webkit-backdrop-filter: saturate(1.2) blur(10px);
    padding: 12px 0 0;
    margin: 0 -16px;
  }
  .topbar-inner {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px 10px;
  }
  .logo {
    width: 28px; height: 28px;
    background: #19B5E8;
    border-radius: 14px 14px 14px 4px;
    flex: 0 0 auto;
  }
  .top-center { flex: 1; min-width: 0; }
  .top-sub {
    font-size: 12px; color: #5A8FA6; letter-spacing: 0.5px;
    font-weight: 600;
  }
  .top-title {
    font-size: 13px; color: #0E3B52; font-weight: 600;
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pill {
    background: #E6F6FB; color: #1684A8;
    font-size: 12px; font-weight: 600;
    padding: 6px 10px; border-radius: 999px;
    flex: 0 0 auto;
  }
  .pill.demo {
    background: #FFF4D6; color: #9A6A00;
  }
  .progress-bar {
    height: 4px; background: #DCEEF6; width: 100%;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #19B5E8;
    width: 0%; transition: width 320ms ease;
  }

  /* 引导卡 */
  .guide {
    background: #fff;
    border-left: 3px solid #19B5E8;
    border-top: 0.5px solid #DCEEF6;
    border-right: 0.5px solid #DCEEF6;
    border-bottom: 0.5px solid #DCEEF6;
    border-radius: 12px;
    padding: 14px 16px;
    margin: 14px 0;
  }
  .guide-title {
    font-size: 17px; font-weight: 700; color: #0E3B52;
    margin: 0 0 4px;
  }
  .guide-sub {
    font-size: 13px; color: #3D6B82;
    margin: 0 0 10px;
  }
  .guide-sub.last { margin-bottom: 0; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 12px; font-weight: 600;
    padding: 5px 10px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .chip-blue { background: #19B5E8; color: #fff; }
  .chip-cyan { background: #DEF1F7; color: #1684A8; }

  /* 方向卡 */
  .card {
    background: #fff;
    border: 0.5px solid #DCEEF6;
    border-radius: 14px;
    padding: 14px 16px;
    margin: 12px 0;
    transition: box-shadow 200ms ease;
  }
  .card.viewed { box-shadow: 0 1px 0 rgba(14, 59, 82, 0.04); }
  .card-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .card-id {
    font-size: 12px; font-weight: 700;
    background: #E6F6FB; color: #1684A8;
    padding: 3px 8px; border-radius: 6px;
    letter-spacing: 0.5px;
  }
  .card-topic {
    font-size: 17px; font-weight: 700; color: #0E3B52;
    flex: 1; min-width: 0;
  }
  .card-speaker {
    font-size: 12px; color: #5A8FA6;
    background: #F0F8FC;
    padding: 3px 8px; border-radius: 999px;
    border: 0.5px solid #DCEEF6;
    white-space: nowrap;
  }
  .card-copy {
    font-size: 14px; line-height: 1.7; color: #0E3B52;
    margin: 6px 0 14px;
    white-space: pre-wrap;
  }
  .vote-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 10px;
  }
  .vote-btn {
    border: 1px solid #DCEEF6;
    background: #fff;
    border-radius: 12px;
    padding: 12px 0;
    font-size: 22px;
    cursor: pointer;
    transition: all 160ms ease;
    user-select: none;
    color: #0E3B52;
  }
  .vote-btn:hover { border-color: #BFE4F2; }
  .vote-btn.heart-active {
    background: #19B5E8; border-color: #19B5E8;
    color: #fff;
  }
  .vote-btn.think-active {
    background: #DEF1F7; border-color: #4FC1DC;
  }
  .feedback {
    width: 100%;
    border: 1px solid #DCEEF6;
    background: #F8FCFE;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    color: #0E3B52;
    outline: none;
    transition: border-color 160ms ease, background 160ms ease;
  }
  .feedback::placeholder { color: #8FB6C7; }
  .feedback:focus {
    border-color: #4FC1DC;
    background: #fff;
  }

  /* 示意页 */
  .demo-stage {
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    margin: 14px 0;
    isolation: isolate;
  }
  .demo-watermark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-25deg);
    font-size: 80px;
    font-weight: 900;
    color: rgba(25, 181, 232, 0.10);
    letter-spacing: 6px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 1;
    user-select: none;
  }
  .demo-stage > .demo-content {
    position: relative;
    z-index: 2;
  }
  .demo-hero {
    background: #fff;
    border: 0.5px solid #DCEEF6;
    border-radius: 14px;
    padding: 28px 22px;
    margin-bottom: 12px;
  }
  .demo-tag {
    display: inline-block;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    color: #1684A8; background: #E6F6FB;
    padding: 4px 10px; border-radius: 999px;
    margin-bottom: 14px;
  }
  .demo-title {
    font-size: 22px; font-weight: 800; line-height: 1.45;
    color: #0E3B52;
    margin: 0 0 12px;
  }
  .demo-sub {
    font-size: 14px; line-height: 1.75; color: #3D6B82;
    margin: 0;
    white-space: pre-wrap;
  }
  .demo-mini {
    background: #F8FCFE;
    border: 0.5px solid #DCEEF6;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .demo-mini-tag {
    font-size: 12px; font-weight: 700;
    color: #1684A8;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .demo-mini-main {
    font-size: 15px; font-weight: 600; color: #0E3B52;
    line-height: 1.6;
    margin: 0 0 4px;
  }
  .demo-mini-sub {
    font-size: 13px; color: #5A8FA6;
    line-height: 1.6;
    margin: 0;
  }
  .demo-hero-mini-tag {
    font-size: 12px; font-weight: 700;
    color: #1684A8;
    letter-spacing: 0.5px;
    margin: 6px 0 8px;
    padding-top: 14px;
    border-top: 0.5px dashed #DCEEF6;
  }
  .demo-hero-mini-main {
    font-size: 15px; font-weight: 600; color: #0E3B52;
    line-height: 1.6;
    margin: 0 0 4px;
  }
  .demo-hero-mini-sub {
    font-size: 13px; color: #5A8FA6;
    line-height: 1.6;
    margin: 0;
  }
  .demo-board {
    background: #fff;
    border: 0.5px solid #DCEEF6;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .demo-board-title {
    font-size: 15px; font-weight: 700; color: #0E3B52;
    margin: 0 0 10px;
  }
  .demo-msg {
    background: #F8FCFE;
    border-left: 3px solid #4FC1DC;
    border-radius: 0 10px 10px 0;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .demo-msg:last-child { margin-bottom: 0; }
  .demo-msg-from {
    font-size: 12px; font-weight: 700; color: #1684A8;
    margin-bottom: 2px;
  }
  .demo-msg-text {
    font-size: 13px; color: #0E3B52; line-height: 1.6;
    margin: 0;
  }
  .demo-feedback-wrap {
    background: #fff;
    border: 0.5px solid #DCEEF6;
    border-radius: 12px;
    padding: 12px;
  }

  /* 翻页栏 */
  .pager {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 0.5px solid #DCEEF6;
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    z-index: 40;
  }
  .pager-inner {
    max-width: 720px; margin: 0 auto;
    display: flex; align-items: center; gap: 10px;
  }
  .pg-btn {
    border: 1px solid #DCEEF6;
    background: #fff;
    color: #0E3B52;
    font-size: 13px; font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    flex: 0 0 auto;
    transition: all 160ms ease;
    white-space: nowrap;
  }
  .pg-btn:hover:not(:disabled) { border-color: #BFE4F2; }
  .pg-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .pg-btn.primary {
    background: #19B5E8; border-color: #19B5E8; color: #fff;
  }
  .pg-btn.primary:hover { background: #14A2D2; }
  .dots {
    flex: 1; display: flex; justify-content: center;
    align-items: center; gap: 5px; min-width: 0;
    overflow: hidden;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: #BFE4F2;
    transition: all 200ms ease;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .dot.active {
    width: 20px; height: 6px;
    background: #19B5E8;
  }
  .dot.demo {
    background: #E6E0C8;
  }
  .dot.demo.active {
    background: #C9A227;
  }

  /* 浮动提示 */
  .floater {
    position: fixed; right: 16px; bottom: 84px;
    background: #0E3B52;
    color: #fff;
    font-size: 13px; font-weight: 500;
    padding: 10px 14px;
    border-radius: 999px;
    display: none;
    align-items: center; gap: 8px;
    cursor: pointer;
    z-index: 30;
    box-shadow: 0 6px 20px rgba(14, 59, 82, 0.25);
    max-width: calc(100vw - 32px);
  }
  .floater.show { display: inline-flex; }
  .floater::before {
    content: ""; width: 6px; height: 6px; border-radius: 999px;
    background: #19B5E8;
    flex: 0 0 auto;
  }

  /* Thank-you / Error overlay */
  .overlay {
    position: fixed; inset: 0;
    background: #fff;
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .overlay.show { display: flex; }
  .ty-inner { text-align: center; max-width: 360px; }
  .ty-check {
    width: 64px; height: 64px; margin: 0 auto 18px;
    background: #19B5E8; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 32px; font-weight: 700;
  }
  .ty-title {
    font-size: 17px; font-weight: 700; color: #0E3B52;
    margin: 0 0 8px;
  }
  .ty-sub {
    font-size: 14px; color: #3D6B82;
    margin: 0;
  }
  .ty-code {
    font-size: 12px; color: #5A8FA6;
    margin-top: 18px;
  }

  .err-box {
    background: #fff;
    border: 1px solid #DCEEF6;
    border-radius: 14px;
    padding: 20px;
    max-width: 360px;
    text-align: left;
  }
  .err-title {
    font-size: 17px; font-weight: 700; color: #0E3B52;
    margin: 0 0 8px;
  }
  .err-msg {
    font-size: 13px; color: #3D6B82;
    margin: 0 0 14px;
    word-break: break-word;
    background: #F8FCFE;
    border: 0.5px solid #DCEEF6;
    border-radius: 8px;
    padding: 8px 10px;
    max-height: 180px; overflow: auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    line-height: 1.5;
  }
  .err-actions { display: flex; gap: 10px; }
  .err-btn {
    flex: 1;
    border: 1px solid #DCEEF6;
    background: #fff; color: #0E3B52;
    padding: 10px; border-radius: 10px;
    font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .err-btn.primary { background: #19B5E8; border-color: #19B5E8; color: #fff; }

  /* Loading state */
  .submitting {
    pointer-events: none; opacity: 0.7;
  }

  @media (max-width: 480px) {
    .top-title { font-size: 12px; }
    .top-sub { font-size: 11px; }
    .pill { font-size: 11px; padding: 5px 9px; }
    .card-topic { font-size: 16px; }
    .pg-btn { padding: 9px 10px; font-size: 12px; }
    .demo-title { font-size: 19px; }
    .demo-watermark { font-size: 44px; letter-spacing: 3px; }
    .demo-hero { padding: 22px 18px; }
  }
  @media (max-width: 360px) {
    .demo-watermark { font-size: 36px; letter-spacing: 2px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo" aria-hidden="true"></div>
      <div class="top-center">
        <div class="top-sub" id="topSub">TIMI YEARBOOK · 活动开启页</div>
        <div class="top-title" id="topTitle">第 1 步 / 共 11 步 · 活动开启页</div>
      </div>
      <div class="pill" id="groupPill">本组进度 0 / 0</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </header>

  <main id="main"></main>
</div>

<div class="floater" id="floater" role="button" tabindex="0">
  <span id="floaterText">本组还有 N 张未看完，点击跳转</span>
</div>

<nav class="pager">
  <div class="pager-inner">
    <button class="pg-btn" id="prevBtn">← 上一页</button>
    <div class="dots" id="dots"></div>
    <button class="pg-btn primary" id="nextBtn">翻开同学录 →</button>
  </div>
</nav>

<div class="overlay" id="thanksOverlay">
  <div class="ty-inner">
    <div class="ty-check">✓</div>
    <h2 class="ty-title">谢谢！你的投票已收到。</h2>
    <p class="ty-sub">可以关闭页面了，周末见。</p>
    <div class="ty-code" id="tyCode"></div>
  </div>
</div>

<div class="overlay" id="errorOverlay">
  <div class="err-box">
    <h2 class="err-title">提交失败</h2>
    <pre class="err-msg" id="errMsg"></pre>
    <div class="err-actions">
      <button class="err-btn" id="errCloseBtn">取消</button>
      <button class="err-btn primary" id="errRetryBtn">重试</button>
    </div>
  </div>
</div>

<script>
/* ============== 数据：9 组投票卡 ============== */
const GROUPS = [
  {
    name: "时间起点 / 陪伴跨度",
    cards: [
      { id: "A01", topic: "第一次见面", speaker: "老亚瑟 · 王者荣耀",
        copy: "2014年，你第一次点开王者荣耀。那时候你可能只是想打一局，没想到后来，我们在峡谷里呆了这么多年。" },
      { id: "A02", topic: "TiMi陪伴跨度", speaker: "小云仔",
        copy: "从2014到2026，TiMi陪你走了12年。但这么久过去，我一直在，你也是。" },
      { id: "A52", topic: "第一个登录游戏 & 最近登录游戏", speaker: "小云仔",
        copy: "你第一次登录的天美游戏，是王者荣耀；最近一次登录的，是QQ飞车手游。一个像很早以前的开场，一个像刚刚写下的新日期。" },
    ]
  },
  {
    name: "TiMi品牌记忆",
    cards: [
      { id: "A81", topic: "TiMi声听过多少次", speaker: "小云仔",
        copy: "这些年，你听过1842次TiMi声。有些声音响多了，就不只是开场了，更像一句\u201c我来了\u201d。" },
      { id: "A82", topic: "第一次听见TiMi声", speaker: "小云仔",
        copy: "你第一次听见TiMi声，是在2014年的王者荣耀。那一下可能很短，但后来响了很多年。" },
    ]
  },
  {
    name: "多游戏轨迹",
    cards: [
      { id: "A03", topic: "玩过几款天美游戏", speaker: "小云仔",
        copy: "这些年，你在TiMi遇见过6位同学。王者荣耀、QQ飞车手游、穿越火线手游、使命召唤手游、天天酷跑、乱世王者，都和你打过照面。" },
      { id: "A36", topic: "新朋友和老朋友", speaker: "小云仔",
        copy: "今年你认识了2位新同学，也回去看了3位老同学。新认识的是使命召唤手游和乱世王者，回去看的是王者荣耀、QQ飞车手游和天天酷跑。新鲜感和旧习惯，你都没落下。" },
      { id: "A57", topic: "新游戏尝鲜率", speaker: "小云仔",
        copy: "今年，你试了2个新的TiMi游戏：使命召唤手游、乱世王者。人会长大，口味会变，但好奇心好像还在。" },
    ]
  },
  {
    name: "深夜 / 生活切片",
    cards: [
      { id: "A04", topic: "最深夜登录", speaker: "小云仔 / 对应游戏角色",
        copy: "凌晨03:47，你还在TiMi。你那时候在王者荣耀。不是不困，可能只是还不太想结束这一天。那晚，TiMi陪你把今天多留了一会儿。" },
      { id: "A05", topic: "连续出现", speaker: "小云仔",
        copy: "你连续28天都来过TiMi。这28天里，你最常打开的是王者荣耀。有几天真的有点像住在TiMi：TiMi声还没响起，人已经到了。" },
      { id: "A66", topic: "平均每次TiMi多久", speaker: "小云仔",
        copy: "你每次来TiMi，平均会待37分钟。不算很长，刚好够一顿晚饭后，把自己从白天里捞出来一会儿。" },
      { id: "A67", topic: "最常TiMi的星期几", speaker: "小云仔",
        copy: "你最常在周五打开TiMi。像是给一周留了个小出口：先不想别的，玩一会儿再说。" },
      { id: "A90", topic: "今年最有生活痕迹的一次登录", speaker: "小云仔",
        copy: "有一次，你在假期最后一天晚上打开TiMi，那次你在王者荣耀。像是给那段假期补了一个不太想结束的尾巴。" },
    ]
  },
  {
    name: "好友关系",
    cards: [
      { id: "A07", topic: "最常一起开黑的人", speaker: "小云仔",
        copy: "这些年和你一起开黑最久的人，是DC***。你们一起TiMi了326小时。按一场电影2小时算，够并排看完163部电影；但你们选择把这些时间，在TiMi相聚。" },
      { id: "A08", topic: "跨游戏同框", speaker: "小云仔",
        copy: "你和DC***在3款TiMi游戏里都碰过头：王者荣耀、QQ飞车手游、穿越火线手游。从峡谷到赛道，再到战场，游戏换了几款，旁边那个人倒是没怎么换。" },
      { id: "A83", topic: "和搭子第一次一起TiMi", speaker: "小云仔",
        copy: "你和DC***第一次一起TiMi，是2017年5月的王者荣耀。那时候你们可能谁也没想到，会一起玩到现在。" },
    ]
  },
  {
    name: "单游戏归属 / 旧物身份",
    cards: [
      { id: "A15", topic: "本命游戏 / 主场同学", speaker: "对应游戏角色",
        copy: "你有62%的TiMi时间，都留给了王者荣耀。能陪伴你度过这段时间，是我的荣幸。下次你来，我还在。" },
      { id: "A23", topic: "装了又删，删了又装", speaker: "小云仔",

/* ============== Utils ============== */
function genShortCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && typeof obj === "object") {
        state.stepIdx = Math.min(Math.max(0, obj.stepIdx || 0), TOTAL_STEPS - 1);
        state.votes = obj.votes || {};
        state.feedback = obj.feedback || {};
        state.viewed = obj.viewed || {};
        state.introVibes = Object.assign({ p0: "", p1: "", p6: "" }, obj.introVibes || {});
        state.shortCode = obj.shortCode || "";
      }
    }
  } catch (e) { /* ignore */ }
  if (!state.shortCode) state.shortCode = genShortCode();
  saveState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      stepIdx: state.stepIdx,
      votes: state.votes,
      feedback: state.feedback,
      viewed: state.viewed,
      introVibes: state.introVibes,
      shortCode: state.shortCode,
    }));
  } catch (e) { /* ignore */ }
}

function getCurrentStep() { return STEPS[state.stepIdx]; }
function getCurrentGroup() {
  const s = getCurrentStep();
  return s.kind === "group" ? GROUPS[s.groupIdx] : null;
}

function getAllCards() {
  const out = [];
  GROUPS.forEach((g, gi) => g.cards.forEach(c => out.push({ ...c, groupIdx: gi, groupName: g.name })));
  return out;
}

function fmtBeijing(d) {
  const utc = d.getTime() + d.getTimezoneOffset() * 60000;
  const bj = new Date(utc + 8 * 3600 * 1000);
  const pad = n => String(n).padStart(2, "0");
  return `${bj.getUTCFullYear()}-${pad(bj.getUTCMonth() + 1)}-${pad(bj.getUTCDate())} ${pad(bj.getUTCHours())}:${pad(bj.getUTCMinutes())}:${pad(bj.getUTCSeconds())}`;
}

function fmtBeijingShort(d) {
  const utc = d.getTime() + d.getTimezoneOffset() * 60000;
  const bj = new Date(utc + 8 * 3600 * 1000);
  const pad = n => String(n).padStart(2, "0");
  return `${bj.getUTCFullYear()}-${pad(bj.getUTCMonth() + 1)}-${pad(bj.getUTCDate())}T${pad(bj.getUTCHours())}:${pad(bj.getUTCMinutes())}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
  }[ch]));
}

function renderMain() {
  const main = document.getElementById("main");

  if (step.kind === "demo") {
    main.innerHTML = renderDemoPage(step.key);
    // 绑定 intro feedback
    const inp = main.querySelector(".intro-feedback");
    if (inp) {
      inp.addEventListener("input", () => {
        state.introVibes[step.key] = inp.value;
        saveState();
      });
    }
    if (observer) observer.disconnect();
  } else {
    main.innerHTML = renderGroupPage(step.groupIdx);

    // 绑定卡片事件
    main.querySelectorAll(".card").forEach(cardEl => {
      const cid = cardEl.dataset.cid;
      cardEl.querySelectorAll(".vote-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const which = btn.dataset.vote;
          const cur = state.votes[cid] || null;
          if (cur === which) {
            state.votes[cid] = null;
          } else {
            state.votes[cid] = which;
          }
          saveState();
          const heartBtn = cardEl.querySelector('[data-vote="heart"]');
          const thinkBtn = cardEl.querySelector('[data-vote="think"]');
          heartBtn.classList.toggle("heart-active", state.votes[cid] === "heart");
          thinkBtn.classList.toggle("think-active", state.votes[cid] === "think");
        });
      });
      const fbInput = cardEl.querySelector(".feedback");
      fbInput.addEventListener("input", () => {
        state.feedback[cid] = fbInput.value;
        saveState();
      });
    });

    // IntersectionObserver
    if (observer) observer.disconnect();
    observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
          const cid = entry.target.dataset.cid;
          if (cid && !state.viewed[cid]) {
            state.viewed[cid] = true;
            entry.target.classList.add("viewed");
            saveState();
            renderTop();
            updateFloater();
          }
        }
      });
    }, { threshold: [0.5] });
    main.querySelectorAll(".card").forEach(el => observer.observe(el));
  }
}

function updateFloater() {
  const f = document.getElementById("floater");
  const step = getCurrentStep();
  if (step.kind !== "group") {
    f.classList.remove("show");

  const cur = GROUPS[step.groupIdx];
  const unviewed = cur.cards.filter(c => !state.viewed[c.id]);
  if (unviewed.length > 0 && unviewed.length < cur.cards.length) {
    document.getElementById("floaterText").textContent =
      `本组还有 ${unviewed.length} 张未看完，点击跳转`;
    f.classList.add("show");
  } else if (unviewed.length === cur.cards.length) {
    document.getElementById("floaterText").textContent =
      `本组共 ${cur.cards.length} 张，点击查看第一张`;
    f.classList.add("show");
  } else {
    f.classList.remove("show");
  }
}

/* ============== Submit ============== */
function buildPayload() {
  const all = getAllCards();
  const total = all.length;
  let heart = 0, think = 0, none = 0;
  const rows = all.map(c => {
    const v = state.votes[c.id] || null;
    if (v === "heart") heart++;
    else if (v === "think") think++;
    else none++;
    return {
      id: c.id,
      group: c.groupName,
      topic: c.topic,
      speaker: c.speaker,
      vote: v,
      feedback: (state.feedback[c.id] || "").trim(),
    };
  });
  return { total, heart, think, none, rows };
}

function buildIssueBody(payload, now) {
  const submitTime = fmtBeijing(now);
  const lines = [];
  lines.push(`**用户短码**: ${state.shortCode}`);
  lines.push(`**提交时间**: ${submitTime} (Asia/Shanghai)`);
  lines.push(`**总卡数**: ${payload.total}`);
  lines.push(`**已表态**: ${payload.heart + payload.think}（❤️ ${payload.heart} / 🤔 ${payload.think}）`);
  lines.push(`**未表态**: ${payload.none}`);
  lines.push("");
  lines.push("## 投票详情");
  lines.push("");
  lines.push("| 编号 | 方向 | 选择 | 吐槽 |");
  lines.push("|---|---|---|---|");
  payload.rows.forEach(r => {
    const v = r.vote === "heart" ? "❤️" : (r.vote === "think" ? "🤔" : "—");
    const fb = (r.feedback || "").replace(/\|/g, "\\|").replace(/\n/g, " ");
    lines.push(`| ${r.id} | ${r.topic} | ${v} | ${fb} |`);
  });
  lines.push("");
  lines.push("## 示意页吐槽");
  lines.push("");
  lines.push("| 页面 | 吐槽 |");
  lines.push("|---|---|");
  const introMap = [
    { key: "p0", label: "P0 活动开启页" },
    { key: "p1", label: "P1 小云仔开口" },
    { key: "p6", label: "P6 同学录小结" },
  ];
  introMap.forEach(it => {
    const raw = (state.introVibes[it.key] || "").trim();
    const cell = raw ? raw.replace(/\|/g, "\\|").replace(/\n/g, " ") : "（未填）";
    lines.push(`| ${it.label} | ${cell} |`);
  });
  lines.push("");
  lines.push("## 原始 JSON");
  lines.push("");
  lines.push("```json");
  lines.push(JSON.stringify({
    shortCode: state.shortCode,
    submitTime,
    summary: { total: payload.total, heart: payload.heart, think: payload.think, none: payload.none },
    rows: payload.rows,
    intro: {
      p0: (state.introVibes.p0 || "").trim(),
      p1: (state.introVibes.p1 || "").trim(),
      p6: (state.introVibes.p6 || "").trim(),
    },
  }, null, 2));
  lines.push("```");
  return lines.join("\n");
}

async function submitVotes() {
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.add("submitting");
  nextBtn.textContent = "提交中…";

  const now = new Date();
  const payload = buildPayload();
  const body = buildIssueBody(payload, now);
  const title = `Vote-${state.shortCode}-${fmtBeijingShort(now)}`;

  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`;
  const token = _tk.join("");

  try {
    const resp = await fetch(url, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ title, body }),
    });

    if (!resp.ok) {
      let detail = "";
      try { detail = await resp.text(); } catch (e) { /* ignore */ }
      throw new Error(`HTTP ${resp.status} ${resp.statusText}\n${detail}`);
    }

    document.getElementById("tyCode").textContent = `用户短码：${state.shortCode}`;
    document.getElementById("thanksOverlay").classList.add("show");
  } catch (err) {
    document.getElementById("errMsg").textContent = String(err && err.message ? err.message : err);
    document.getElementById("errorOverlay").classList.add("show");
  } finally {
    nextBtn.classList.remove("submitting");
    renderPager();
  }
}

/* ============== Pager events ============== */
function bindPager() {
  document.getElementById("prevBtn").addEventListener("click", () => {
    if (state.stepIdx > 0) {
      state.stepIdx -= 1;
      saveState();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });
  document.getElementById("nextBtn").addEventListener("click", () => {
    const action = document.getElementById("nextBtn").dataset.action;
    if (action === "submit") {
      submitVotes();
      return;
    }
    if (state.stepIdx < TOTAL_STEPS - 1) {
      state.stepIdx += 1;
      saveState();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });

  document.getElementById("floater").addEventListener("click", () => {
    const step = getCurrentStep();
    if (step.kind !== "group") return;
    const cur = GROUPS[step.groupIdx];
    const target = cur.cards.find(c => !state.viewed[c.id]);
    if (target) {
      const el = document.querySelector(`.card[data-cid="${target.id}"]`);
      if (el) {
        const top = el.getBoundingClientRect().top + window.pageYOffset - 80;
        window.scrollTo({ top, behavior: "smooth" });
      }
    }
  });

  document.getElementById("errCloseBtn").addEventListener("click", () => {
    document.getElementById("errorOverlay").classList.remove("show");
  });
  document.getElementById("errRetryBtn").addEventListener("click", () => {
    document.getElementById("errorOverlay").classList.remove("show");
    submitVotes();
  });
}

/* ============== Init ============== */
function init() {
  loadState();
  bindPager();
  renderAll();
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
